<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Probation Registration</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>


      <section id="probation" class="section">
        <div class="container">
      
          <h2>Probation Registration</h2>
      
          <form id="probation-form" class="form">

            <label>Full Name</label>
            <input type="text" id="fullname" required>
          
            <label>Phone Number</label>
            <input type="tel" id="phone" required>
          
            <label>Email</label>
            <input type="email" id="email" required>
          
            <label>Age</label>
            <input type="number" id="age" min="18" required>
          
            <label>Why do you want to join?</label>
            <textarea id="reason" rows="4"></textarea>
          
            <button id="submitBtn" type="submit">Submit Registration</button>
          
            <p id="error-message" style="display:none; color:red;"></p>
          
            <div id="success-box" style="display:none; color:green; margin-top:10px;">
              <h3>Application Submitted ✔</h3>
              <p>Status: Pending Approval</p>
            </div>
          
          </form>
        </div>
      </section>
  <script src="script.js"></script>
</body>
</html>
